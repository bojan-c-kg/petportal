services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: petportal
      POSTGRES_USER: petportal
      POSTGRES_PASSWORD: petportal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petportal -d petportal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=petportal;Username=petportal;Password=petportal"
      Jwt__Secret: "demo-only-secret-at-least-32-characters-long-for-hmac-sha256"
      Jwt__Issuer: PetPortal
      Jwt__Audience: PetPortal
      FrontendOrigin: http://localhost:5173
    ports:
      - "5069:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
